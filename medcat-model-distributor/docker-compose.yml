services:
  medcatweb:
    image: cogstacksystems/medcat-model-distributor
    volumes:
      - ./webapp/data:/webapp/data
      - ./webapp/db:/webapp/db
      - ./webapp/models:/webapp/models
      - ./envs/env_db_backup:/etc/environment
      - medcat_data:/medcat_data
    ports:
      - "80:8000"
    env_file:
      - ./envs/env_medmen
      - ./envs/env_db_backup
    tty: true

volumes:
  medcat_data:
    driver: local
