# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: MedCAT Service Documentation
site_url: http://localhost:8080/docs/

theme:
  name: material
  favicon: _static/img/cat-logo.svg
  logo: _static/img/cat-logo.svg
  icon:
    logo:  _static/img/cat-logo.svg
  palette:
    primary: white

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - navigation.footer
    - header.autohide
    - content.tooltips
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - attr_list

repo_url: https://github.com/CogStack/cogstack-nlp
repo_name: cogstack-nlp

docs_dir: docs

nav:
  - Home: index.md
  - Getting Started:
    - Installation: setup/installation.md
    - Configuration: setup/configuration.md
  - User guide:
    - Demo UI: user-guide/demo-ui.md
    - API Example Use: user-guide/api-example-use.md
  - Reference:
    - Extending Medcat Service: reference/extensions.md


plugins:
  - search
  - termynal

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
