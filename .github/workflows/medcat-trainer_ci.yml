name: medcat-trainer ci-build

on:
  pull_request:
    paths:
      - "medcat-trainer/**"
      - ".github/workflows/medcat-trainer**"

defaults:
  run:
    working-directory: ./medcat-trainer

jobs:
  # Test and build client library
  test-client:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest build

      - name: Install client package in development mode
        run: |
          cd client
          pip install -e .

      - name: Run client tests
        run: |
          cd client
          python -m pytest tests/ -v

      - name: Build client package
        run: |
          cd client
          python -m build

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd webapp/frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd webapp/frontend
          npm run test:unit

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          cd webapp
          pip install -r requirements.txt

      - name: Download spaCy model
        run: |
          python -m spacy download en_core_web_md

      - name: Run Django tests
        env:
          DB_ENGINE: sqlite3
          SECRET_KEY: test-secret-key
          DEBUG: 1
        run: |
          cd webapp/api
          python manage.py test

  # Build and test webapp container
  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - test-client
      - test-frontend
      - test-backend
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Build
        env:
          IMAGE_TAG: ${{ env.RELEASE_VERSION }}
        run: |
          docker build -t cogstacksystems/medcat-trainer:dev-latest webapp/.
      - name: Run Django Tests
        env:
          IMAGE_TAG: ${{ env.RELEASE_VERSION }}
        run: |
          # run tests
          docker run --rm cogstacksystems/medcat-trainer:dev-latest python manage.py test
